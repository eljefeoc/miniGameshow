<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fish Stack — Babs' Trading Post</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }

  :root {
    --gold:   #ffd166;
    --orange: #ff6b35;
    --teal:   #06d6a0;
    --blue:   #a8d8ea;
    --purple: #7b5ea7;
    --dark:   #0d0820;
    --mid:    #1a1035;
    --white:  #e8f4f8;
  }

  html, body {
    width:100%; height:100%;
    background: var(--dark);
    display:flex; justify-content:center; align-items:center;
    overflow:hidden; touch-action:none;
    font-family:'Nunito',sans-serif;
  }

  body::before {
    content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
    background:
      radial-gradient(ellipse 130% 50% at 15% 0%,  rgba(6,214,160,0.15) 0%, transparent 55%),
      radial-gradient(ellipse 80%  40% at 85% 5%,  rgba(255,107,53,0.10) 0%, transparent 50%),
      linear-gradient(180deg, #0d0820 0%, #1a1035 50%, #2d1b69 100%);
  }

  #wrap {
    position:relative; z-index:1;
    width:100%; max-width:400px;
    height:100dvh; max-height:760px;
    display:flex; flex-direction:column; align-items:center;
  }

  /* ── HEADER ── */
  #hdr {
    width:100%; display:flex; justify-content:space-between; align-items:center;
    padding:10px 16px 4px; flex-shrink:0;
  }
  #hdr h1 {
    font-family:'Fredoka One',cursive; font-size:22px;
    color:var(--gold); text-shadow:0 2px 10px rgba(255,209,102,0.45);
    line-height:1;
  }
  #hdr p { font-size:10px; color:var(--blue); opacity:.65; margin-top:1px; }
  #score-wrap { text-align:right; }
  #score-wrap .lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--blue); opacity:.55; }
  #score-num {
    font-family:'Fredoka One',cursive; font-size:28px;
    color:var(--teal); line-height:1;
    text-shadow:0 0 14px rgba(6,214,160,0.5);
    display:inline-block; transition:transform .1s;
  }
  #score-num.pop { transform:scale(1.35); }

  /* ── BABS ZONE ── */
  #babs-zone {
    width:calc(100% - 28px); margin:0 14px 5px;
    display:flex; align-items:center; gap:10px;
    background:rgba(123,94,167,0.14);
    border:1px solid rgba(123,94,167,0.32);
    border-radius:14px; padding:5px 12px;
    flex-shrink:0; overflow:hidden;
  }
  #babs-cv { flex-shrink:0; }

  #bubble-wrap { flex:1; position:relative; }
  #bubble {
    background:rgba(232,244,248,0.09);
    border:1.5px solid rgba(168,216,234,0.22);
    border-radius:10px; padding:6px 10px;
    font-size:12px; font-weight:800;
    color:var(--white); line-height:1.35;
    min-height:38px; display:flex; align-items:center;
    transition:background .25s, border-color .25s;
  }
  #bubble.happy  { border-color:rgba(6,214,160,0.55);  background:rgba(6,214,160,0.08);  }
  #bubble.angry  { border-color:rgba(255,107,53,0.55);  background:rgba(255,107,53,0.08); }
  #bubble.shock  { border-color:rgba(255,209,102,0.6);  background:rgba(255,209,102,0.08); }

  /* ── GAME AREA ── */
  #game-area {
    position:relative; flex:1; width:100%;
    display:flex; justify-content:center; align-items:flex-start;
    overflow:hidden;
  }
  #game-cv {
    display:block;
    border-radius:10px 10px 0 0;
    border:1px solid rgba(168,216,234,0.12);
    border-bottom:none;
  }

  /* side panels */
  #panel-right {
    position:absolute; top:8px; right:10px;
    display:flex; flex-direction:column; align-items:center; gap:6px;
  }
  #panel-right .lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--blue); opacity:.5; }
  #next-cv {
    border-radius:8px; border:1px solid rgba(168,216,234,0.12);
    background:rgba(255,255,255,0.04);
  }

  #panel-left {
    position:absolute; top:8px; left:10px;
    display:flex; flex-direction:column; gap:7px;
  }
  .stat .lbl { font-size:9px; text-transform:uppercase; letter-spacing:1px; color:var(--blue); opacity:.5; }
  .stat .val {
    font-family:'Fredoka One',cursive; font-size:19px; line-height:1;
    color:var(--gold);
  }
  .stat .val.lv { color:var(--purple); }

  /* overlays */
  .ov {
    position:absolute; inset:0;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px;
    background:rgba(10,6,26,0.92); border-radius:10px 10px 0 0;
    z-index:20; backdrop-filter:blur(5px);
  }
  .ov h2 {
    font-family:'Fredoka One',cursive; font-size:32px;
    color:var(--gold); text-shadow:0 0 20px rgba(255,209,102,0.5);
    text-align:center;
  }
  .ov p { font-size:12px; color:var(--blue); opacity:.8; text-align:center; max-width:200px; line-height:1.5; }
  .ov .big {
    font-family:'Fredoka One',cursive; font-size:46px;
    color:var(--teal); text-shadow:0 0 18px rgba(6,214,160,0.55);
  }
  .go-btn {
    background:linear-gradient(135deg,var(--orange),var(--gold));
    border:none; border-radius:13px; color:var(--dark);
    font-family:'Fredoka One',cursive; font-size:18px;
    padding:12px 30px; cursor:pointer;
    box-shadow:0 4px 16px rgba(255,107,53,0.4);
    transition:transform .15s;
  }
  .go-btn:active { transform:scale(.95); }

  /* ── CONTROLS ── */
  #ctrls {
    width:100%; display:flex; justify-content:center; gap:8px;
    padding:7px 14px 11px;
    background:rgba(13,8,32,0.88);
    border-top:1px solid rgba(168,216,234,0.07);
    flex-shrink:0;
  }
  .cb {
    background:rgba(123,94,167,0.28); border:1.5px solid rgba(123,94,167,0.5);
    border-radius:11px; color:var(--white);
    font-family:'Fredoka One',cursive; font-size:19px;
    width:54px; height:48px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    user-select:none; -webkit-tap-highlight-color:transparent; touch-action:none;
    transition:background .1s, transform .1s;
  }
  .cb:active { background:rgba(123,94,167,0.58); transform:scale(.92); }
  .cb.rot  { background:rgba(255,107,53,0.18); border-color:rgba(255,107,53,0.4); font-size:17px; }
  .cb.dn   { background:rgba(6,214,160,0.13);  border-color:rgba(6,214,160,0.38); width:68px; }
</style>
</head>
<body>
<div id="wrap">

  <div id="hdr">
    <div>
      <h1>🐟 Fish Stack</h1>
      <p>Babs' Arctic Trading Post</p>
    </div>
    <div id="score-wrap">
      <div class="lbl">Score</div>
      <div id="score-num">0</div>
    </div>
  </div>

  <div id="babs-zone">
    <canvas id="babs-cv" width="72" height="72"></canvas>
    <div id="bubble-wrap">
      <div id="bubble">Hmph. Don't waste my shelf space.</div>
    </div>
  </div>

  <div id="game-area">
    <canvas id="game-cv"></canvas>

    <div id="panel-right">
      <div class="lbl">Next</div>
      <canvas id="next-cv" width="62" height="62"></canvas>
    </div>

    <div id="panel-left">
      <div class="stat"><div class="lbl">Rows</div><div class="val" id="v-lines">0</div></div>
      <div class="stat"><div class="lbl">Level</div><div class="val lv" id="v-level">1</div></div>
    </div>

    <div class="ov" id="ov-start">
      <h2>Babs' Fish Stack</h2>
      <p>Stack fish on the trading post shelves. Fill a row and Babs approves… mostly.</p>
      <button class="go-btn" id="btn-start">Open the Shop!</button>
    </div>
    <div class="ov" id="ov-end" style="display:none">
      <h2>Shop Closed!</h2>
      <div class="big" id="v-final">0</div>
      <p id="end-msg">Babs has locked the door.</p>
      <button class="go-btn" id="btn-restart">Try Again</button>
    </div>
  </div>

  <div id="ctrls">
    <button class="cb"     id="c-left">&#9664;</button>
    <button class="cb rot" id="c-rotl">&#8634;</button>
    <button class="cb dn"  id="c-down">&#9660;&#9660;</button>
    <button class="cb rot" id="c-rotr">&#8635;</button>
    <button class="cb"     id="c-right">&#9654;</button>
  </div>
</div>

<script>
(function(){
'use strict';

/* ═══════════════════════════════════════════
   FISH PIECE DEFINITIONS
   Each piece is a grid of cells, but drawn
   as a fish silhouette via a custom path fn.
   Grids are kept small (max 4 wide) so they
   fit the board naturally.
═══════════════════════════════════════════ */
var PIECES = [
  {
    // FAT SALMON  ><>  2×3 chunky body
    id:'salmon', color:'#ff7b7b', dark:'#b84444', accent:'#ffb3b3',
    grid:[[1,1,0],
          [1,1,1],
          [0,1,0]],
    draw: function(c,x,y,cs,alpha){
      drawSalmon(c,x,y,cs,this.color,this.dark,this.accent,alpha);
    }
  },
  {
    // EEL  long horizontal 1×4
    id:'eel', color:'#74c0fc', dark:'#2a6ea0', accent:'#b8e4ff',
    grid:[[1,1,1,1]],
    draw: function(c,x,y,cs,alpha){
      drawEel(c,x,y,cs,this.color,this.dark,this.accent,alpha);
    }
  },
  {
    // PUFFERFISH  round 2×2 + spike
    id:'puffer', color:'#ffd166', dark:'#a07010', accent:'#fff0a0',
    grid:[[0,1,0],
          [1,1,1],
          [0,1,0]],
    draw: function(c,x,y,cs,alpha){
      drawPuffer(c,x,y,cs,this.color,this.dark,this.accent,alpha);
    }
  },
  {
    // HERRING  slim L-shape
    id:'herring', color:'#06d6a0', dark:'#038860', accent:'#80ffe0',
    grid:[[1,0],
          [1,0],
          [1,1]],
    draw: function(c,x,y,cs,alpha){
      drawHerring(c,x,y,cs,this.color,this.dark,this.accent,alpha);
    }
  },
  {
    // TUNA  reverse-L
    id:'tuna', color:'#a78bfa', dark:'#5a3db0', accent:'#d4c0ff',
    grid:[[0,1],
          [0,1],
          [1,1]],
    draw: function(c,x,y,cs,alpha){
      drawTuna(c,x,y,cs,this.color,this.dark,this.accent,alpha);
    }
  },
  {
    // COD  S-shape
    id:'cod', color:'#ff9a3c', dark:'#a05000', accent:'#ffd0a0',
    grid:[[1,1,0],
          [0,1,1]],
    draw: function(c,x,y,cs,alpha){
      drawCod(c,x,y,cs,this.color,this.dark,this.accent,alpha);
    }
  },
  {
    // MACKEREL  Z-shape
    id:'mackerel', color:'#c77dff', dark:'#7030aa', accent:'#e8c0ff',
    grid:[[0,1,1],
          [1,1,0]],
    draw: function(c,x,y,cs,alpha){
      drawMackerel(c,x,y,cs,this.color,this.dark,this.accent,alpha);
    }
  }
];

/* ═══════════════════════════════════════════
   FISH DRAWING FUNCTIONS
   Each draws using the cell grid as a canvas.
   Cells are CELL×CELL px. We draw the fish
   body stretched across occupied cells with
   characteristic fins / tails / eyes.
═══════════════════════════════════════════ */

function setAlpha(c, a){ c.globalAlpha = (a===undefined)?1:a; }

// Generic helper: fill a rounded cell block
function rrect(c,x,y,w,h,r){
  r=Math.min(r,w/2,h/2);
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.arc(x+w-r,y+r,r,-Math.PI/2,0);
  c.lineTo(x+w,y+h-r); c.arc(x+w-r,y+h-r,r,0,Math.PI/2);
  c.lineTo(x+r,y+h); c.arc(x+r,y+h-r,r,Math.PI/2,Math.PI);
  c.lineTo(x,y+r); c.arc(x+r,y+r,r,Math.PI,-Math.PI/2);
  c.closePath();
}

// Shared cell painter used by all fish
function paintCells(c, grid, ox, oy, cs, color, dark, accent, alpha){
  setAlpha(c, alpha||1);
  for(var r=0;r<grid.length;r++){
    for(var cc=0;cc<grid[r].length;cc++){
      if(!grid[r][cc]) continue;
      var px=ox+cc*cs, py=oy+r*cs;
      // body
      c.fillStyle=color;
      rrect(c,px+1,py+1,cs-2,cs-2,Math.round(cs*0.28)); c.fill();
      // top sheen
      c.fillStyle='rgba(255,255,255,0.20)';
      rrect(c,px+3,py+3,cs-8,Math.max(3,Math.round(cs*0.18)),2); c.fill();
      // bottom shadow
      c.fillStyle=dark;
      rrect(c,px+1,py+cs-4,cs-2,3,1); c.fill();
    }
  }
  setAlpha(c,1);
}

function drawEye(c, px, py, cs, alpha){
  setAlpha(c,alpha||1);
  var r=Math.max(2,cs*0.13);
  c.fillStyle='rgba(255,255,255,0.85)';
  c.beginPath(); c.arc(px,py,r+1,0,Math.PI*2); c.fill();
  c.fillStyle='#1a0a30';
  c.beginPath(); c.arc(px,py,r,0,Math.PI*2); c.fill();
  c.fillStyle='rgba(255,255,255,0.6)';
  c.beginPath(); c.arc(px-r*0.3,py-r*0.3,r*0.35,0,Math.PI*2); c.fill();
  setAlpha(c,1);
}

// SALMON — chunky body facing right, tail on left
function drawSalmon(c,ox,oy,cs,color,dark,accent,alpha){
  paintCells(c,[[1,1,0],[1,1,1],[0,1,0]],ox,oy,cs,color,dark,accent,alpha);
  setAlpha(c,alpha||1);
  // tail fin bottom-left area
  c.fillStyle=dark;
  c.beginPath();
  c.moveTo(ox+cs*0.15, oy+cs*2.5);
  c.lineTo(ox-cs*0.25, oy+cs*2.0);
  c.lineTo(ox-cs*0.25, oy+cs*3.0);
  c.closePath(); c.fill();
  // dorsal fin top
  c.fillStyle=accent;
  c.beginPath();
  c.moveTo(ox+cs*0.5,oy+cs*0.05);
  c.quadraticCurveTo(ox+cs*1.2,oy-cs*0.35,ox+cs*1.7,oy+cs*0.05);
  c.lineTo(ox+cs*1.7,oy+cs*0.2);
  c.lineTo(ox+cs*0.5,oy+cs*0.2);
  c.closePath(); c.fill();
  // eye on right side, middle row
  drawEye(c, ox+cs*1.75, oy+cs*1.5, cs, alpha);
  setAlpha(c,1);
}

// EEL — long sinuous horizontal shape
function drawEel(c,ox,oy,cs,color,dark,accent,alpha){
  paintCells(c,[[1,1,1,1]],ox,oy,cs,color,dark,accent,alpha);
  setAlpha(c,alpha||1);
  // wave stripe
  c.strokeStyle=accent; c.lineWidth=Math.max(1.5,cs*0.08); c.lineCap='round';
  c.beginPath();
  c.moveTo(ox+cs*0.3, oy+cs*0.45);
  c.bezierCurveTo(ox+cs*1.0,oy+cs*0.15, ox+cs*2.0,oy+cs*0.78, ox+cs*2.7,oy+cs*0.45);
  c.bezierCurveTo(ox+cs*3.2,oy+cs*0.22, ox+cs*3.6,oy+cs*0.5, ox+cs*3.8,oy+cs*0.5);
  c.stroke();
  // tail fin at left
  c.fillStyle=dark;
  c.beginPath();
  c.moveTo(ox+cs*0.05,oy+cs*0.3);
  c.lineTo(ox-cs*0.3,oy+cs*0.05);
  c.lineTo(ox-cs*0.3,oy+cs*0.85);
  c.closePath(); c.fill();
  // eye near right
  drawEye(c, ox+cs*3.55, oy+cs*0.45, cs, alpha);
  setAlpha(c,1);
}

// PUFFERFISH — spiky plus shape
function drawPuffer(c,ox,oy,cs,color,dark,accent,alpha){
  paintCells(c,[[0,1,0],[1,1,1],[0,1,0]],ox,oy,cs,color,dark,accent,alpha);
  setAlpha(c,alpha||1);
  // spines on outer cells
  var spineColor=dark;
  var spineData=[
    [ox+cs,   oy,      0,-1],
    [ox+cs*2, oy+cs,   1, 0],
    [ox+cs,   oy+cs*3, 0, 1],
    [ox,      oy+cs,  -1, 0]
  ];
  c.fillStyle=spineColor;
  spineData.forEach(function(s){
    c.beginPath();
    c.moveTo(s[0]+cs*0.3+s[2]*cs*0.5, s[1]+cs*0.3+s[3]*cs*0.5);
    c.lineTo(s[0]+cs*0.5+s[2]*cs*0.6, s[1]+cs*0.5+s[3]*cs*0.6);
    c.lineTo(s[0]+cs*0.7+s[2]*cs*0.5, s[1]+cs*0.7+s[3]*cs*0.5);
    c.closePath(); c.fill();
  });
  // eye in centre-right
  drawEye(c, ox+cs*1.65, oy+cs*1.45, cs, alpha);
  setAlpha(c,1);
}

// HERRING — slim vertical L
function drawHerring(c,ox,oy,cs,color,dark,accent,alpha){
  paintCells(c,[[1,0],[1,0],[1,1]],ox,oy,cs,color,dark,accent,alpha);
  setAlpha(c,alpha||1);
  // tail fin top
  c.fillStyle=dark;
  c.beginPath();
  c.moveTo(ox+cs*0.5,oy+cs*0.1);
  c.lineTo(ox+cs*0.1,oy-cs*0.3);
  c.lineTo(ox+cs*0.9,oy-cs*0.3);
  c.closePath(); c.fill();
  // scale stripe
  c.strokeStyle=accent; c.lineWidth=Math.max(1,cs*0.06); c.lineCap='round';
  c.beginPath();
  c.moveTo(ox+cs*0.55,oy+cs*0.6);
  c.bezierCurveTo(ox+cs*0.8,oy+cs*1.2, ox+cs*0.7,oy+cs*1.8, ox+cs*0.55,oy+cs*2.4);
  c.stroke();
  // eye
  drawEye(c, ox+cs*0.5, oy+cs*0.7, cs, alpha);
  setAlpha(c,1);
}

// TUNA — reverse-L, big powerful fish
function drawTuna(c,ox,oy,cs,color,dark,accent,alpha){
  paintCells(c,[[0,1],[0,1],[1,1]],ox,oy,cs,color,dark,accent,alpha);
  setAlpha(c,alpha||1);
  // forked tail on top-right
  c.fillStyle=dark;
  c.beginPath();
  c.moveTo(ox+cs*1.5,oy+cs*0.1);
  c.lineTo(ox+cs*1.1,oy-cs*0.35);
  c.lineTo(ox+cs*1.5,oy+cs*0.3);
  c.lineTo(ox+cs*1.9,oy-cs*0.35);
  c.closePath(); c.fill();
  // dorsal fin
  c.fillStyle=accent;
  c.beginPath();
  c.moveTo(ox+cs*1.1,oy+cs*0.1);
  c.quadraticCurveTo(ox+cs*1.5,oy-cs*0.2,ox+cs*1.85,oy+cs*0.1);
  c.lineTo(ox+cs*1.85,oy+cs*0.3);
  c.lineTo(ox+cs*1.1,oy+cs*0.3);
  c.closePath(); c.fill();
  // eye
  drawEye(c, ox+cs*1.5, oy+cs*0.7, cs, alpha);
  setAlpha(c,1);
}

// COD — S-curve shape
function drawCod(c,ox,oy,cs,color,dark,accent,alpha){
  paintCells(c,[[1,1,0],[0,1,1]],ox,oy,cs,color,dark,accent,alpha);
  setAlpha(c,alpha||1);
  // tail left
  c.fillStyle=dark;
  c.beginPath();
  c.moveTo(ox+cs*0.1,oy+cs*0.5);
  c.lineTo(ox-cs*0.3,oy+cs*0.1);
  c.lineTo(ox-cs*0.3,oy+cs*0.9);
  c.closePath(); c.fill();
  // eye top-right
  drawEye(c, ox+cs*1.7, oy+cs*0.48, cs, alpha);
  setAlpha(c,1);
}

// MACKEREL — Z-shape, streamlined
function drawMackerel(c,ox,oy,cs,color,dark,accent,alpha){
  paintCells(c,[[0,1,1],[1,1,0]],ox,oy,cs,color,dark,accent,alpha);
  setAlpha(c,alpha||1);
  // racing stripe
  c.strokeStyle=accent; c.lineWidth=Math.max(1.5,cs*0.09); c.lineCap='round';
  c.beginPath();
  c.moveTo(ox+cs*1.2,oy+cs*0.45);
  c.bezierCurveTo(ox+cs*1.6,oy+cs*0.35, ox+cs*1.8,oy+cs*0.65, ox+cs*2.2,oy+cs*0.55);
  c.stroke();
  // tail on bottom-left
  c.fillStyle=dark;
  c.beginPath();
  c.moveTo(ox+cs*0.1,oy+cs*1.5);
  c.lineTo(ox-cs*0.3,oy+cs*1.1);
  c.lineTo(ox-cs*0.3,oy+cs*1.9);
  c.closePath(); c.fill();
  // eye top-right
  drawEye(c, ox+cs*2.65, oy+cs*0.45, cs, alpha);
  setAlpha(c,1);
}


/* ═══════════════════════════════════════════
   ENGINE
═══════════════════════════════════════════ */
var COLS=8, ROWS=16, CELL=30;
var canvas    = document.getElementById('game-cv');
var ctx       = canvas.getContext('2d');
var nextCv    = document.getElementById('next-cv');
var nextCtx   = nextCv.getContext('2d');
var babsCv    = document.getElementById('babs-cv');
var babsCtx   = babsCv.getContext('2d');

function sizeCanvas(){
  var area=document.getElementById('game-area');
  var ch=Math.floor(area.clientHeight/ROWS);
  var cw=Math.floor((area.clientWidth-88)/COLS);
  CELL=Math.max(16,Math.min(ch,cw,36));
  canvas.width=CELL*COLS;
  canvas.height=CELL*ROWS;
}

var board, cur, nxt;
var score,lines,level,delay;
var running=false, lastDrop=0, raf=null;

function initBoard(){
  board=[];
  for(var i=0;i<ROWS;i++){ var r=[]; for(var j=0;j<COLS;j++) r.push(null); board.push(r); }
}

function makePiece(){
  var p=PIECES[Math.floor(Math.random()*PIECES.length)];
  return {
    def:p,
    grid:p.grid.map(function(r){return r.slice();}),
    x:Math.floor(COLS/2)-Math.floor(p.grid[0].length/2),
    y:0
  };
}

function valid(piece,ox,oy,grid){
  ox=ox||0; oy=oy||0;
  var g=grid||piece.grid;
  for(var r=0;r<g.length;r++) for(var c=0;c<g[r].length;c++){
    if(!g[r][c]) continue;
    var nx=piece.x+c+ox, ny=piece.y+r+oy;
    if(nx<0||nx>=COLS||ny>=ROWS) return false;
    if(ny>=0&&board[ny][nx]) return false;
  }
  return true;
}

function cloneGrid(g){ return g.map(function(r){return r.slice();}); }

function rotateCW(g){
  var R=g.length,C=g[0].length,o=[];
  for(var c=0;c<C;c++){var row=[];for(var r=0;r<R;r++)row.push(0);o.push(row);}
  for(var r=0;r<R;r++)for(var c=0;c<C;c++) o[c][R-1-r]=g[r][c];
  return o;
}
function rotateCCW(g){
  var R=g.length,C=g[0].length,o=[];
  for(var c=0;c<C;c++){var row=[];for(var r=0;r<R;r++)row.push(0);o.push(row);}
  for(var r=0;r<R;r++)for(var c=0;c<C;c++) o[C-1-c][r]=g[r][c];
  return o;
}

function lockPiece(){
  var g=cur.grid,x=cur.x,y=cur.y,def=cur.def;
  for(var r=0;r<g.length;r++) for(var c=0;c<g[r].length;c++){
    if(!g[r][c]) continue;
    if(y+r<0){endGame();return;}
    board[y+r][x+c]=def;
  }
  var cleared=sweepLines();
  cur=nxt; nxt=makePiece(); drawNext();
  if(!valid(cur)){endGame();return;}
  babsReact(cleared);
}

function sweepLines(){
  var cleared=0;
  for(var r=ROWS-1;r>=0;r--){
    var full=true;
    for(var c=0;c<COLS;c++) if(!board[r][c]){full=false;break;}
    if(full){ board.splice(r,1); var empty=[]; for(var j=0;j<COLS;j++) empty.push(null); board.unshift(empty); cleared++;r++; }
  }
  if(cleared){
    var pts=([0,100,300,500,800][cleared]||800)*level;
    score+=pts; lines+=cleared;
    level=Math.floor(lines/8)+1;
    delay=Math.max(80,800-(level-1)*70);
    updateHUD(); popScore();
  }
  return cleared;
}

function updateHUD(){
  document.getElementById('score-num').textContent=score.toLocaleString();
  document.getElementById('v-lines').textContent=lines;
  document.getElementById('v-level').textContent=level;
}
function popScore(){
  var el=document.getElementById('score-num');
  el.classList.add('pop');
  setTimeout(function(){el.classList.remove('pop');},150);
}

/* ─── moves ─── */
function mLeft(){  if(cur&&running&&valid(cur,-1)) cur.x--; }
function mRight(){ if(cur&&running&&valid(cur,1))  cur.x++; }
function mDown(){
  if(!cur||!running) return;
  if(valid(cur,0,1)) cur.y++;
  else lockPiece();
}
function mDrop(){
  if(!cur||!running) return;
  while(valid(cur,0,1)){cur.y++;score+=2;}
  lockPiece(); updateHUD();
}
function mRot(d){
  if(!cur||!running) return;
  var ng=d>0?rotateCW(cur.grid):rotateCCW(cur.grid);
  if(valid(cur,0,0,ng)){cur.grid=ng;return;}
  var kicks=[-1,1,-2,2];
  for(var i=0;i<kicks.length;i++) if(valid(cur,kicks[i],0,ng)){cur.x+=kicks[i];cur.grid=ng;return;}
}

/* ─── draw ─── */
function drawBoard(){
  ctx.fillStyle='rgba(18,10,40,0.97)';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // subtle grid
  ctx.strokeStyle='rgba(168,216,234,0.04)'; ctx.lineWidth=0.5;
  for(var r=0;r<ROWS;r++){ctx.beginPath();ctx.moveTo(0,r*CELL);ctx.lineTo(canvas.width,r*CELL);ctx.stroke();}
  for(var c=0;c<COLS;c++){ctx.beginPath();ctx.moveTo(c*CELL,0);ctx.lineTo(c*CELL,canvas.height);ctx.stroke();}

  // locked fish
  for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
    if(board[r][c]) drawLockedCell(c,r,board[r][c]);
  }

  // ghost
  if(cur){
    var ghost={x:cur.x,y:cur.y,grid:cloneGrid(cur.grid),def:cur.def};
    while(valid(ghost,0,1)) ghost.y++;
    if(ghost.y!==cur.y){
      drawPieceAt(ghost, 0.18);
    }
  }

  // current piece
  if(cur) drawPieceAt(cur, 1);

  // ice shimmer
  var g=ctx.createLinearGradient(0,canvas.height-10,0,canvas.height);
  g.addColorStop(0,'rgba(168,216,234,0)'); g.addColorStop(1,'rgba(168,216,234,0.09)');
  ctx.fillStyle=g; ctx.fillRect(0,canvas.height-10,canvas.width,10);
}

// Draw a locked individual cell (fish piece cell) using its def color
function drawLockedCell(cx,cy,def){
  var px=cx*CELL, py=cy*CELL;
  ctx.fillStyle=def.color;
  rrect(ctx,px+1,py+1,CELL-2,CELL-2,Math.round(CELL*0.25)); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.16)';
  rrect(ctx,px+3,py+3,CELL-8,Math.max(3,Math.round(CELL*0.16)),2); ctx.fill();
  ctx.fillStyle=def.dark;
  rrect(ctx,px+1,py+CELL-4,CELL-2,3,1); ctx.fill();
  // small fish detail: tiny stripe
  ctx.strokeStyle=def.accent||'rgba(255,255,255,0.2)';
  ctx.lineWidth=Math.max(1,CELL*0.06); ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(px+CELL*0.25, py+CELL*0.55);
  ctx.quadraticCurveTo(px+CELL*0.5,py+CELL*0.38, px+CELL*0.75,py+CELL*0.55);
  ctx.stroke();
}

function drawPieceAt(piece, alpha){
  var ox=piece.x*CELL, oy=piece.y*CELL;
  var a=alpha===undefined?1:alpha;
  var def=piece.def;
  var grid=piece.grid;

  // Paint cells using the live (possibly rotated) grid
  paintCells(ctx, grid, ox, oy, CELL, def.color, def.dark, def.accent||'rgba(255,255,255,0.2)', a);

  if(a < 0.5) return; // skip decorations on ghost

  // Find bounding box of occupied cells
  var minR=grid.length,maxR=0,minC=grid[0].length,maxC=0;
  for(var r=0;r<grid.length;r++) for(var c=0;c<grid[r].length;c++){
    if(grid[r][c]){ if(r<minR)minR=r; if(r>maxR)maxR=r; if(c<minC)minC=c; if(c>maxC)maxC=c; }
  }
  var bx=ox+minC*CELL, by=oy+minR*CELL;
  var w=(maxC-minC+1)*CELL, h=(maxR-minR+1)*CELL;

  ctx.globalAlpha=a;
  ctx.lineCap='round';

  // Eye top-right of bounding box
  drawEye(ctx, bx+w*0.78, by+h*0.28, CELL, 1);

  // Tail (left side) for most fish
  if(def.id!=='puffer'){
    ctx.fillStyle=def.dark;
    ctx.beginPath();
    ctx.moveTo(bx+w*0.06, by+h*0.38);
    ctx.lineTo(bx-CELL*0.3, by+h*0.1);
    ctx.lineTo(bx-CELL*0.3, by+h*0.7);
    ctx.closePath(); ctx.fill();
  }

  if(def.id==='eel'){
    // wavy stripe
    ctx.strokeStyle=def.accent; ctx.lineWidth=Math.max(1.5,CELL*0.08);
    ctx.beginPath();
    ctx.moveTo(bx+w*0.1, by+h*0.42);
    ctx.bezierCurveTo(bx+w*0.35,by+h*0.18, bx+w*0.65,by+h*0.72, bx+w*0.9,by+h*0.42);
    ctx.stroke();
  } else if(def.id==='puffer'){
    // spines on 4 sides
    ctx.fillStyle=def.dark;
    [[0.5,0,0,-1],[1,0.5,1,0],[0.5,1,0,1],[0,0.5,-1,0]].forEach(function(s){
      ctx.beginPath();
      ctx.moveTo(bx+w*s[0]+CELL*s[2]*0.08,by+h*s[1]+CELL*s[3]*0.08);
      ctx.lineTo(bx+w*s[0]+CELL*s[2]*0.42,by+h*s[1]+CELL*s[3]*0.42);
      ctx.lineTo(bx+w*s[0]+CELL*s[2]*0.08+CELL*0.14,by+h*s[1]+CELL*s[3]*0.08+CELL*0.14);
      ctx.closePath(); ctx.fill();
    });
    drawEye(ctx, bx+w*0.6, by+h*0.45, CELL, 1);
  } else if(def.id==='salmon'||def.id==='tuna'){
    // dorsal fin
    ctx.fillStyle=def.accent||'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.moveTo(bx+w*0.2,by+h*0.06);
    ctx.quadraticCurveTo(bx+w*0.5,by-CELL*0.28,bx+w*0.8,by+h*0.06);
    ctx.lineTo(bx+w*0.8,by+h*0.22); ctx.lineTo(bx+w*0.2,by+h*0.22);
    ctx.closePath(); ctx.fill();
  } else {
    // racing stripe for cod/herring/mackerel
    ctx.strokeStyle=def.accent||'rgba(255,255,255,0.25)'; ctx.lineWidth=Math.max(1.5,CELL*0.08);
    ctx.beginPath();
    ctx.moveTo(bx+w*0.18,by+h*0.44);
    ctx.bezierCurveTo(bx+w*0.42,by+h*0.24,bx+w*0.65,by+h*0.62,bx+w*0.88,by+h*0.44);
    ctx.stroke();
  }

  ctx.globalAlpha=1;
}

function drawNext(){
  nextCtx.clearRect(0,0,62,62);
  if(!nxt) return;
  var g=nxt.grid;
  var cw=Math.min(12,Math.floor(54/g[0].length));
  var ch=Math.min(12,Math.floor(54/g.length));
  var cs=Math.min(cw,ch);
  var ox=Math.floor((62-g[0].length*cs)/2);
  var oy=Math.floor((62-g.length*cs)/2);
  // draw cells
  paintCells(nextCtx,g,ox,oy,cs,nxt.def.color,nxt.def.dark,nxt.def.accent||'rgba(255,255,255,0.2)',1);
}

/* ═══════════════════════════════════════════
   BABS — REACTIVE WALRUS SHOPKEEPER
   States: idle | happy | angry | shocked | slam
═══════════════════════════════════════════ */
var babsState='idle';
var babsResetTid=null;
var babsTimer=0;
var babsEyeState='open'; // open | blink | squint | wide | x
var babsMouthState='flat'; // flat | smile | frown | open
var babsShakeX=0, babsShakeTick=0;
var babsFrame=0;
var babsBreath=0;

// Reaction triggers
var LINES = [
  { state:'happy', eye:'wide', mouth:'smile', text:["...Not terrible.", "Fine. That works.", "I suppose that'll do.", "Hmm. Acceptable."] },
  { state:'happy', eye:'wide', mouth:'smile', text:["Good stack.", "Two rows! Efficient.", "Keep it up.", "Maybe you DO know fish."] },
  { state:'happy', eye:'wide', mouth:'open',  text:["THREE ROWS?!", "Oh. That's... good.", "Impressive haul.", "Now THAT'S how you stack!"] },
  { state:'happy', eye:'wide', mouth:'open',  text:["FOUR ROWS! UNBELIEVABLE.", "I've never... wow.", "THE SHELVES ARE FULL.", "My trading post has never looked so good!!"] }
];

var BABS_IDLE = [
  "Hmph. Don't waste my shelf space.",
  "Stack it right or don't stack it at all.",
  "I've been here since the last thaw. Hurry up.",
  "*sighs heavily*",
  "Every fish has a place. Know it.",
  "Gaps mean lost coin. Remember that."
];
var BABS_GAP = [
  "Ugh. Gaps. I hate gaps.",
  "That gap is going to haunt you.",
  "A sloppy stack is a sloppy profit.",
  "I've seen seals stack better.",
  "Fill the gaps. FILL THEM."
];
var BABS_GAMEOVER = [
  "I KNEW you'd stack it wrong.",
  "Unsurprising. Deeply unsurprising.",
  "Come back when you're serious.",
  "The trading post is closed. Indefinitely.",
  "Not even close to my standards."
];

function rand(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function babsReact(cleared){
  if(cleared>0){
    var idx=Math.min(cleared-1,3);
    var r=LINES[idx];
    setBabs(r.state, r.eye, r.mouth, rand(r.text));
    if(cleared>=2) babsShakeTick=18; // happy bounce
  } else {
    // occasionally comment on messy stack
    if(Math.random()<0.12) setBabs('angry','squint','frown', rand(BABS_GAP));
    else if(Math.random()<0.05) setBabs('idle','blink','flat', rand(BABS_IDLE));
  }
}

function setBabs(state, eye, mouth, text, duration){
  babsState=state; babsEyeState=eye; babsMouthState=mouth;
  var bub=document.getElementById('bubble');
  bub.textContent=text||'';
  bub.className='';
  if(state==='happy') bub.classList.add('happy');
  else if(state==='angry') bub.classList.add('angry');
  else if(state==='shock') bub.classList.add('shock');
  // auto-reset to idle after a bit
  if(babsResetTid) clearTimeout(babsResetTid);
  if(duration!==99999){
    babsResetTid=setTimeout(function(){
      babsState='idle'; babsEyeState='open'; babsMouthState='flat';
      document.getElementById('bubble').className='';
      babsResetTid=null;
    }, duration||3200);
  }
}

function drawBabs(){
  babsCtx.clearRect(0,0,72,72);
  babsFrame++;
  babsBreath=Math.sin(babsFrame*0.022)*1.8;

  // slam shake
  if(babsShakeTick>0){
    babsShakeX=Math.sin(babsShakeTick*1.2)*(babsShakeTick*0.2);
    babsShakeTick--;
  } else { babsShakeX=0; }

  babsCtx.save();
  babsCtx.translate(babsShakeX,0);

  // shadow
  babsCtx.fillStyle='rgba(0,0,0,0.2)';
  babsCtx.beginPath(); babsCtx.ellipse(36,68,24,5,0,0,Math.PI*2); babsCtx.fill();

  var bodyY=46+babsBreath;

  // body
  babsCtx.fillStyle = (babsState==='angry') ? '#8a5fbe' : '#7b5ea7';
  babsCtx.beginPath(); babsCtx.ellipse(36,bodyY,21,15+babsBreath*0.4,0,0,Math.PI*2); babsCtx.fill();
  babsCtx.fillStyle='rgba(255,255,255,0.08)';
  babsCtx.beginPath(); babsCtx.ellipse(29,bodyY-7,9,5,-0.3,0,Math.PI*2); babsCtx.fill();

  // flippers — raised if happy, slammed if angry
  babsCtx.fillStyle='#6a4e97';
  var flipOffset = babsState==='happy' ? -4 : (babsState==='angry' ? 3 : 0);
  babsCtx.beginPath(); babsCtx.ellipse(14,bodyY+flipOffset,7,4.5,-0.5,0,Math.PI*2); babsCtx.fill();
  babsCtx.beginPath(); babsCtx.ellipse(58,bodyY+flipOffset,7,4.5,0.5,0,Math.PI*2); babsCtx.fill();

  var headY=24+babsBreath*0.25;

  // head
  babsCtx.fillStyle='#8b6eb7';
  babsCtx.beginPath(); babsCtx.ellipse(36,headY,18,16,0,0,Math.PI*2); babsCtx.fill();
  babsCtx.fillStyle='#7b5ea7';
  babsCtx.beginPath(); babsCtx.ellipse(36,headY+6,16,10,0,0,Math.PI); babsCtx.fill();

  // tusks
  babsCtx.fillStyle='#efe0c0';
  babsCtx.beginPath(); babsCtx.moveTo(28,headY+10); babsCtx.quadraticCurveTo(25,headY+21,27,headY+25); babsCtx.quadraticCurveTo(29,headY+21,29,headY+10); babsCtx.fill();
  babsCtx.beginPath(); babsCtx.moveTo(44,headY+10); babsCtx.quadraticCurveTo(47,headY+21,45,headY+25); babsCtx.quadraticCurveTo(43,headY+21,43,headY+10); babsCtx.fill();

  // snout
  babsCtx.fillStyle='#9b7ec8';
  babsCtx.beginPath(); babsCtx.ellipse(36,headY+8,10,7,0,0,Math.PI*2); babsCtx.fill();
  babsCtx.fillStyle='rgba(70,40,110,0.5)';
  babsCtx.beginPath(); babsCtx.ellipse(32,headY+7,2,1.5,-0.3,0,Math.PI*2); babsCtx.fill();
  babsCtx.beginPath(); babsCtx.ellipse(40,headY+7,2,1.5,0.3,0,Math.PI*2); babsCtx.fill();

  // MOUTH
  babsCtx.lineWidth=2; babsCtx.lineCap='round';
  if(babsMouthState==='smile'){
    babsCtx.strokeStyle='rgba(80,40,120,0.7)';
    babsCtx.beginPath(); babsCtx.arc(36,headY+9,4,0.2,Math.PI-0.2); babsCtx.stroke();
  } else if(babsMouthState==='frown'){
    babsCtx.strokeStyle='rgba(80,40,120,0.7)';
    babsCtx.beginPath(); babsCtx.arc(36,headY+14,4,Math.PI+0.2,-0.2); babsCtx.stroke();
  } else if(babsMouthState==='open'){
    babsCtx.fillStyle='rgba(60,20,100,0.5)';
    babsCtx.beginPath(); babsCtx.ellipse(36,headY+10,4,3,0,0,Math.PI*2); babsCtx.fill();
  } else {
    babsCtx.strokeStyle='rgba(80,40,120,0.5)';
    babsCtx.beginPath(); babsCtx.moveTo(32,headY+10); babsCtx.lineTo(40,headY+10); babsCtx.stroke();
  }

  // BROWS — always furrowed, but intensity varies
  babsCtx.strokeStyle = babsState==='angry' ? '#ff4444' : '#503080';
  babsCtx.lineWidth = babsState==='angry' ? 2.5 : 2;
  babsCtx.lineCap='round';
  var browAngle = babsState==='angry' ? 3 : 2;
  babsCtx.beginPath(); babsCtx.moveTo(23,headY-10); babsCtx.lineTo(33,headY-10+browAngle); babsCtx.stroke();
  babsCtx.beginPath(); babsCtx.moveTo(39,headY-10+browAngle); babsCtx.lineTo(49,headY-10); babsCtx.stroke();

  // EYES
  var eyeH;
  if(babsEyeState==='blink')   eyeH=1;
  else if(babsEyeState==='squint') eyeH=3;
  else if(babsEyeState==='wide')   eyeH=9;
  else eyeH=6;

  // auto blink
  if(babsEyeState==='open'){
    babsTimer++;
    if(babsTimer>220){ babsTimer=0; babsEyeState='blink'; setTimeout(function(){ if(babsEyeState==='blink') babsEyeState='open'; },120); }
  }

  babsCtx.fillStyle='#ede0ff';
  babsCtx.beginPath(); babsCtx.ellipse(28,headY-3,6,eyeH,0,0,Math.PI*2); babsCtx.fill();
  babsCtx.beginPath(); babsCtx.ellipse(44,headY-3,6,eyeH,0,0,Math.PI*2); babsCtx.fill();

  if(babsEyeState!=='blink'){
    if(babsEyeState==='x'){
      // X eyes for game over
      babsCtx.strokeStyle='#2d1b69'; babsCtx.lineWidth=2;
      babsCtx.beginPath(); babsCtx.moveTo(25,headY-6); babsCtx.lineTo(31,headY); babsCtx.stroke();
      babsCtx.beginPath(); babsCtx.moveTo(31,headY-6); babsCtx.lineTo(25,headY); babsCtx.stroke();
      babsCtx.beginPath(); babsCtx.moveTo(41,headY-6); babsCtx.lineTo(47,headY); babsCtx.stroke();
      babsCtx.beginPath(); babsCtx.moveTo(47,headY-6); babsCtx.lineTo(41,headY); babsCtx.stroke();
    } else {
      // pupils — look slightly downward (watching the stack)
      var pupilY = babsEyeState==='wide' ? headY-2 : headY-1;
      babsCtx.fillStyle='#1a0a30';
      babsCtx.beginPath(); babsCtx.ellipse(28,pupilY,2.5,Math.min(3.5,eyeH*0.55),0,0,Math.PI*2); babsCtx.fill();
      babsCtx.beginPath(); babsCtx.ellipse(44,pupilY,2.5,Math.min(3.5,eyeH*0.55),0,0,Math.PI*2); babsCtx.fill();
      babsCtx.fillStyle='rgba(255,255,255,0.55)';
      babsCtx.beginPath(); babsCtx.arc(26.5,pupilY-1,1,0,Math.PI*2); babsCtx.fill();
      babsCtx.beginPath(); babsCtx.arc(42.5,pupilY-1,1,0,Math.PI*2); babsCtx.fill();
    }
  }

  babsCtx.restore();
}

/* ─── game loop ─── */
function loop(ts){
  if(!running) return;
  drawBoard();
  if(ts-lastDrop>delay){ mDown(); lastDrop=ts; }
  raf=requestAnimationFrame(loop);
}

function babsLoop(){
  drawBabs();
  requestAnimationFrame(babsLoop);
}

function startGame(){
  if(raf) cancelAnimationFrame(raf);
  initBoard(); score=0; lines=0; level=1; delay=800;
  updateHUD(); sizeCanvas();
  cur=makePiece(); nxt=makePiece(); drawNext();
  running=true;
  document.getElementById('ov-start').style.display='none';
  document.getElementById('ov-end').style.display='none';
  setBabs('idle','open','flat', rand(BABS_IDLE), 99999);
  lastDrop=performance.now();
  raf=requestAnimationFrame(loop);
}

function endGame(){
  running=false;
  if(raf) cancelAnimationFrame(raf);
  document.getElementById('v-final').textContent=score.toLocaleString();
  document.getElementById('ov-end').style.display='flex';
  babsEyeState='x'; babsMouthState='frown'; babsState='angry';
  var bub=document.getElementById('bubble');
  bub.textContent=rand(BABS_GAMEOVER);
  bub.className='angry';
}

/* ─── input ─── */
document.addEventListener('keydown', function(e){
  if(!running) return;
  if(e.code==='ArrowLeft'||e.key==='ArrowLeft'){  mLeft();  e.preventDefault(); }
  if(e.code==='ArrowRight'||e.key==='ArrowRight'){ mRight(); e.preventDefault(); }
  if(e.code==='ArrowDown'||e.key==='ArrowDown'){  mDown();  e.preventDefault(); }
  if(e.code==='ArrowUp'||e.key==='ArrowUp'){    mRot(1);  e.preventDefault(); }
  if(e.code==='Space'){                          mDrop();  e.preventDefault(); }
  if(e.code==='KeyZ'||e.key==='z'){             mRot(-1); e.preventDefault(); }
});

function addBtn(id,fn,rep){
  var el=document.getElementById(id), iv=null;
  function go(e){ e.preventDefault(); fn(); if(rep) iv=setInterval(fn,105); }
  function stop(){ if(iv){clearInterval(iv);iv=null;} }
  el.addEventListener('touchstart',go,{passive:false});
  el.addEventListener('touchend',stop,{passive:true});
  el.addEventListener('touchcancel',stop,{passive:true});
  el.addEventListener('mousedown',go);
  el.addEventListener('mouseup',stop);
  el.addEventListener('mouseleave',stop);
}
addBtn('c-left',  mLeft,       true);
addBtn('c-right', mRight,      true);
addBtn('c-down',  mDown,       true);
addBtn('c-rotr',  function(){mRot(1);},  false);
addBtn('c-rotl',  function(){mRot(-1);}, false);

// double-tap drop
var lastTap=0;
document.getElementById('c-down').addEventListener('touchstart',function(e){
  var now=Date.now(); if(now-lastTap<300){e.preventDefault();mDrop();} lastTap=now;
},{passive:false});

// swipe
var tx=0,ty=0,tm=false;
canvas.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;tm=false;},{passive:true});
canvas.addEventListener('touchmove',function(e){
  var dx=e.touches[0].clientX-tx,dy=e.touches[0].clientY-ty;
  if(Math.abs(dx)>18){if(dx>0)mRight();else mLeft();tx=e.touches[0].clientX;tm=true;}
  if(dy>24){mDown();ty=e.touches[0].clientY;tm=true;}
},{passive:true});
canvas.addEventListener('touchend',function(){if(!tm)mRot(1);},{passive:true});

document.getElementById('btn-start').addEventListener('click',startGame);
document.getElementById('btn-restart').addEventListener('click',startGame);

/* ─── boot ─── */
sizeCanvas();
ctx.fillStyle='rgba(18,10,40,0.97)'; ctx.fillRect(0,0,canvas.width,canvas.height);
babsLoop();
setBabs('idle','open','flat',"Hmph. Don't waste my shelf space.",99999);

})();
</script>
</body>
